<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terry Game Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 2rem;
        }
        
        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 3rem;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .feature-card h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .feature-card p {
            font-size: 0.9rem;
            opacity: 0.8;
            line-height: 1.6;
        }
        

        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 5% auto;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 1200px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .close-modal {
            color: rgba(255, 255, 255, 0.8);
            float: right;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        
        .close-modal:hover {
            color: white;
        }
        
        .modal-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .modal-header h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .modal-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .methodology-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .dimension-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }
        
        .dimension-card:hover {
            transform: translateY(-3px);
        }
        
        .dimension-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .dimension-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffd700;
        }
        
        .dimension-item {
            margin-bottom: 1rem;
            padding-left: 1rem;
            border-left: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        .dimension-item h4 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: #a8edea;
        }
        
        .dimension-item p {
            font-size: 0.85rem;
            opacity: 0.8;
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }
        
        .score-standard {
            font-size: 0.75rem;
            background: rgba(255, 215, 0, 0.15);
            padding: 0.5rem;
            border-radius: 8px;
            border-left: 3px solid #ffd700;
            margin-top: 0.5rem;
        }
        
        .score-standard strong {
            color: #ffd700;
        }
        
        .score-indicator {
            display: flex;
            gap: 0.25rem;
            margin-top: 0.3rem;
        }
        
        .score-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .score-dot.bad { background: #ff4757; }
        .score-dot.poor { background: #ffa502; }
        .score-dot.good { background: #2ed573; }
        .score-dot.excellent { background: #1e90ff; }
        
        footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.2rem;
            }
            
            .features {
                grid-template-columns: 1fr;
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Terry Game Lab</h1>
        <p class="subtitle">游戏行业分析 · 设计研究 · 体验评测</p>
        
        <div class="features">
            <div class="feature-card">
                <h3>🎮 游戏深度分析</h3>
                <p>从玩法机制、美术设计、剧情叙事到商业化模式的全方位专业评测</p>
            </div>
            
            <div class="feature-card">
                <h3>📊 行业趋势研究</h3>
                <p>跟踪全球游戏市场动态，分析品类发展趋势和用户行为变化</p>
            </div>
            
            <div class="feature-card">
                <h3>💡 创新设计探索</h3>
                <p>挖掘游戏设计创新点，为产品立项和迭代提供决策参考</p>
            </div>
            
            <div class="feature-card">
                <h3>🔍 竞品深度对比</h3>
                <p>同类产品多维度对比分析，识别差异化机会和竞争优势</p>
            </div>
            
            <div class="feature-card">
                <a href="methodology.html" style="color: inherit; text-decoration: none;">
                    <h3>🧩 游戏设计方法论</h3>
                    <p>科学的游戏评判维度体系，从核心体验到商业化的全流程设计指南</p>
                </a>
            </div>
        </div>
        
        <footer>
            <p>© 2024 Terry Game Lab. Powered by passion for games.</p>
        </footer>
    </div>
    

</body>
</html>
